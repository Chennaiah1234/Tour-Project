version: '3.8'

services:

  # PHP + Apache Web Server
  web:
    build: .
    container_name: tour_web
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=tour
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html
    networks:
      - tour_network
    restart: unless-stopped

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: tour_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tour
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tour_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # phpMyAdmin (optional - for DB management UI)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: tour_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    depends_on:
      - db
    networks:
      - tour_network
    restart: unless-stopped

networks:
  tour_network:
    driver: bridge

volumes:
  db_data:
    driver: local
